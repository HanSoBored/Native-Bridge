name: Release & Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'VERSION'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check Tag
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          sudo apt-get install -y gcc-14-aarch64-linux-gnu gcc-14-arm-linux-gnueabihf gcc-14-i686-linux-gnu
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/aarch64-linux-gnu-gcc aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-14 100
          sudo update-alternatives --install /usr/bin/arm-linux-gnueabihf-gcc arm-linux-gnueabihf-gcc /usr/bin/arm-linux-gnueabihf-gcc-14 100
          sudo update-alternatives --install /usr/bin/i686-linux-gnu-gcc i686-linux-gnu-gcc /usr/bin/i686-linux-gnu-gcc-14 100
          gcc --version
          aarch64-linux-gnu-gcc --version

      - name: Build Linux Server & MCP
        run: |
          mkdir -p dist
          # x86_64
          make clean
          make build/nativeb_server
          make build/nativeb_mcp
          mv build/nativeb_server dist/nativeb-server-linux-x86_64
          mv build/nativeb_mcp dist/nativeb-mcp-linux-x86_64

          # aarch64
          make clean
          CC=aarch64-linux-gnu-gcc make build/nativeb_server
          CC=aarch64-linux-gnu-gcc make build/nativeb_mcp
          mv build/nativeb_server dist/nativeb-server-linux-aarch64
          mv build/nativeb_mcp dist/nativeb-mcp-linux-aarch64

          # armv7
          make clean
          CC=arm-linux-gnueabihf-gcc make build/nativeb_server
          CC=arm-linux-gnueabihf-gcc make build/nativeb_mcp
          mv build/nativeb_server dist/nativeb-server-linux-armv7
          mv build/nativeb_mcp dist/nativeb-mcp-linux-armv7

      - name: Build Android Binaries
        run: |
          # aarch64
          make clean
          CC=aarch64-linux-gnu-gcc make build/andro
          mv build/andro dist/nativeb-andro-aarch64

          # armv7
          make clean
          CC=arm-linux-gnueabihf-gcc make build/andro
          mv build/andro dist/nativeb-andro-armv7

          # x86
          make clean
          CC=i686-linux-gnu-gcc make build/andro
          mv build/andro dist/nativeb-andro-x86

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: .github/external/cliff.toml
          args: --verbose --unreleased --tag v${{ needs.check-version.outputs.version }} --strip all
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          body: ${{ steps.git_cliff.outputs.content }}
          files: dist/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
