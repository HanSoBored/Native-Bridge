name: Release & Publish

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'VERSION'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check Tag
        id: check_tag
        run: |
          git fetch --tags
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Build Linux Server & MCP
        run: |
          mkdir -p dist
          # x86_64
          make clean
          make build/nativeb_server
          make build/nativeb_mcp
          mv build/nativeb_server dist/nativeb-server-linux-x86_64
          mv build/nativeb_mcp dist/nativeb-mcp-linux-x86_64

          # aarch64
          make clean
          CC=aarch64-linux-gnu-gcc make build/nativeb_server
          CC=aarch64-linux-gnu-gcc make build/nativeb_mcp
          mv build/nativeb_server dist/nativeb-server-linux-aarch64
          mv build/nativeb_mcp dist/nativeb-mcp-linux-aarch64

          # armv7
          make clean
          CC=arm-linux-gnueabihf-gcc make build/nativeb_server
          CC=arm-linux-gnueabihf-gcc make build/nativeb_mcp
          mv build/nativeb_server dist/nativeb-server-linux-armv7
          mv build/nativeb_mcp dist/nativeb-mcp-linux-armv7

      - name: Install Android NDK
        run: |
          NDK_VERSION="r25c"
          wget --no-verbose https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          echo "ANDROID_NDK_ROOT=$(pwd)/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      - name: Build Android Server with NDK
        run: |
          # Define NDK toolchain paths
          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          API=24

          # aarch64
          make clean
          CC=$TOOLCHAIN/bin/aarch64-linux-android$API-clang \
          make build/nativeb_server
          mv build/nativeb_server dist/nativeb-server-android-aarch64

          # armv7
          make clean
          CC=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang \
          make build/nativeb_server
          mv build/nativeb_server dist/nativeb-server-android-armv7

          # x86
          make clean
          CC=$TOOLCHAIN/bin/i686-linux-android$API-clang \
          make build/nativeb_server
          mv build/nativeb_server dist/nativeb-server-android-x86

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: .github/external/cliff.toml
          args: --verbose --unreleased --tag v${{ needs.check-version.outputs.version }} --strip all
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          body: ${{ steps.git_cliff.outputs.content }}
          files: dist/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
